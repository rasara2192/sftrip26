let activePeople = { sara: true, jaime: true };
let activeTypes = { travel: true, work: true, food: true, social: true, leisure: true, family: true };

function togglePerson(p, el) {
  activePeople[p] = !activePeople[p];
  el.className = 'pill ' + (activePeople[p] ? 'active-' + p : '');
  render();
}

function toggleType(t, el) {
  activeTypes[t] = !activeTypes[t];
  el.className = 'pill ' + (activeTypes[t] ? 'active-filter' : '');
  render();
}

function blockVisible(block) {
  if (!activeTypes[block.type]) return false;
  if (block.person === 'both') return activePeople.sara || activePeople.jaime;
  if (block.person === 'sara') return activePeople.sara;
  if (block.person === 'jaime') return activePeople.jaime;
  return true;
}

function personBadge(p) {
  if (p === 'sara') return '<span class="block-person b-sara">Sara</span>';
  if (p === 'jaime') return '<span class="block-person b-jaime">Jaime</span>';
  return '<span class="block-person b-both">Both</span>';
}

  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  days.forEach(day => {
    const visibleBlocks = day.blocks.filter(blockVisible);
    if (visibleBlocks.length === 0) return;
    const tagHtml = (day.tags || []).map(t => {
      const cls = t === 'travel' ? 'tag-travel' : t === 'work-sara' ? 'tag-work-sara' : t === 'work-jaime' ? 'tag-work-jaime' : t === 'family' ? 'tag-family' : t === 'social' ? 'tag-social' : t === 'free' ? 'tag-free' : 'tag-leisure';
      const label = t === 'work-sara' ? 'Sara works' : t === 'work-jaime' ? 'Jaime works' : t;
      return `<span class="tag ${cls}">${label}</span>`;
    }).join('');
    const blocksHtml = visibleBlocks.map(b => {
      const colorClass = TYPE_COLORS[b.type] || 'b-both';
      const noteHtml = b.note ? `<div class="block-sub" style="color: var(--color-text-tertiary); font-style: italic;">${b.note}</div>` : '';
      return `<div class="block">
        <span class="block-time">${b.time}</span>
        <div class="block-content">
          <div class="block-title">${b.title}</div>
          <div class="block-sub">${b.sub}</div>
          ${noteHtml}
        </div>
        ${personBadge(b.person)}
      </div>`;
    }).join('');
    const noteHtml = day.note ? `<div class="note">${day.note}</div>` : '';
    grid.innerHTML += `<div class="day-card">
      <div class="day-header">
        <span class="day-num">${day.date}</span>
        <div>
          <div style="font-weight: 500; font-size: 13px; color: var(--color-text-primary);">May</div>
          <div class="day-name">${day.name}</div>
        </div>
        <div class="day-tags">${tagHtml}</div>
      </div>
      <div class="blocks">${blocksHtml}</div>
      ${noteHtml}
    </div>`;
  });
}

function render() {
  renderDays(DAYS_MIAMI, 'days-grid');
  renderDays(DAYS_SF, 'sf-grid');
  renderDays(DAYS_RETURN, 'return-grid');
}

render();
</script>
