<style>
  :root {
    --bg: #f7f7f5;
    --white: #ffffff;
    --border: #e8e8e4;
    --border2: #d4d4ce;
    --text: #1a1a1a;
    --muted: #888880;
    --subtle: #f0f0ec;
    --sara: #b8306a;
    --sara-bg: #fdf0f6;
    --sara-border: #f0b8d4;
    --jaime: #1a5fb0;
    --jaime-bg: #e8f0fc;
    --jaime-border: #b8d0f0;
    --both: #b0b0b0;
    --both-bg: #fafafa;
    --both-border: #f0f0f0;
    --amber: #b85c00;
    --amber-bg: #fff3e0;
    --amber-border: #fdd89a;
    --red-bg: #fff0f0;
    --green-bg: #f0faf4;
    --pink: #b8306a;
    --pink-bg: #fdf0f6;
    --purple-bg: #f5f0fc;
    --blue-bg: #eef4ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 20px; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .trip-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .trip-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--subtle); color: var(--muted); padding: 4px 9px; border-radius: 6px; border: 1px solid var(--border); }

  .city-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .city-tabs::-webkit-scrollbar { display: none; }
  .city-tab { flex-shrink: 0; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 8px 8px 0 0; cursor: pointer; color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: all 0.15s; white-space: nowrap; background: transparent; }
  .city-tab.active { background: var(--white); color: var(--text); border-color: var(--border); }

  .filters { position: sticky; top: var(--header-h, 89px); z-index: 90; background: var(--white); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; align-items: center; }
  .filters::-webkit-scrollbar { display: none; }
  .fsep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .flabel { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; }
  .pill { flex-shrink: 0; font-size: 11px; font-weight: 500; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; user-select: none; }
  .pill.on-sara  { background: var(--sara-bg); color: var(--sara); border-color: var(--sara-border); }  .pill.on-jaime { background: var(--jaime-bg); color: var(--jaime); border-color: var(--jaime-border); }
  .pill.on-type  { background: var(--subtle); color: var(--text); border-color: var(--border2); }

  .main { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  .section-hidden { display: none; }

  .day-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--subtle); cursor: pointer; user-select: none; }
  .day-header:active { background: var(--border); }
  .chevron { font-size: 12px; color: var(--muted); margin-left: 6px; transition: transform 0.2s; flex-shrink: 0; }
  .collapsed .chevron { transform: rotate(-90deg); }
  .collapsed .blocks, .collapsed .day-note { display: none; }
  .day-num { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; min-width: 36px; color: var(--text); }
  .day-wd { font-size: 13px; font-weight: 500; color: var(--text); }
  .day-mo { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .day-chips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; margin-left: auto; }
  .chip { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
  .ch-flight   { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .ch-work     { background: var(--red-bg); color: #c04040; border: 1px solid #f0c8c8; }
  .ch-meal     { background: var(--green-bg); color: #2a8a50; border: 1px solid #b8e8c8; }
  .ch-social   { background: var(--pink-bg); color: var(--pink); border: 1px solid #f0c0d8; }
  .ch-tourism  { background: var(--purple-bg); color: #6b5ea8; border: 1px solid #d0c8f0; }
  .ch-workout  { background: #fff7e0; color: #a06000; border: 1px solid #fcd878; }
  .block.clickable { cursor: pointer; }
  .block.clickable:active { opacity: 0.75; }
  .blocks { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .block { display: flex; gap: 10px; align-items: flex-start; padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--white); border-left-width: 3px; }
  .block.who-sara  { border-left-color: var(--sara);  background: var(--sara-bg);  border-color: var(--sara-border); }
  .block.who-jaime { border-left-color: var(--jaime); background: var(--jaime-bg); border-color: var(--jaime-border); }
  .block.who-both  { border-left-color: var(--both);  background: var(--both-bg);  border-color: var(--both-border); }

  .btime { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); min-width: 50px; padding-top: 2px; flex-shrink: 0; white-space: nowrap; }
  .bbody { flex: 1; min-width: 0; }
  .btitle { font-size: 13px; font-weight: 500; line-height: 1.3; color: var(--text); }
  .bsub { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .bnote { font-size: 10px; color: var(--amber); margin-top: 3px; font-style: italic; }
  .bwho { font-size: 10px; padding: 1px 7px; border-radius: 999px; margin-left: 6px; flex-shrink: 0; align-self: center; white-space: nowrap; font-weight: 500; }
  .bw-sara  { background: var(--sara-bg); color: var(--sara); border: 1px solid var(--sara-border); }
  .bw-jaime { background: var(--jaime-bg); color: var(--jaime); border: 1px solid var(--jaime-border); }
  .bw-both  { background: var(--both-bg); color: var(--both); border: 1px solid var(--both-border); }

  .macro-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .mc { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--subtle); color: var(--muted); border: 1px solid var(--border); }
  .mwho { font-size: 9px; color: var(--muted); margin-top: 4px; margin-bottom: 1px; font-weight: 500; }

  .day-note { font-size: 10px; color: var(--amber); padding: 7px 14px 10px; border-top: 1px solid var(--amber-border); background: var(--amber-bg); font-style: italic; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13px; font-style: italic; }

  .legend { display: none; /* hidden for now, keep for later */ 
  .li { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .ld { width: 7px; height: 7px; border-radius: 50%; }
</style>

// activeType: null = show all, else = show only this type
// activePerson: null = show all, else = show only this person
let activeType = null;
let activePerson = null;
let city = 'miami';

function switchCity(c,el){
  city=c;
  document.querySelectorAll('.city-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.main').forEach(s=>s.classList.add('section-hidden'));
  document.getElementById('s-'+c).classList.remove('section-hidden');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toAmPm(t){
  // only convert clean HH:MM patterns, leave ~, 🇪🇸, "In-flight" etc untouched
  return t.replace(/^(~?)(\d{1,2}):(\d{2})/, (_, prefix, h, m) => {
    h = parseInt(h);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${prefix}${h12}:${m} ${ampm}`;
  });
}

function toggleP(p, el){
  activePerson = activePerson === p ? null : p;
  document.querySelectorAll('.pill[data-who]').forEach(pill => {
    const who = pill.dataset.who;
    pill.className = 'pill ' + (activePerson === who ? 'on-'+who : '');
  });
  render();
}

function toggleT(t, el){
  activeType = activeType === t ? null : t;
  document.querySelectorAll('.pill[data-type]').forEach(pill => {
    const type = pill.dataset.type;
    pill.className = 'pill ' + (activeType === type ? 'on-type' : '');
  });
  render();
}

function bVis(b){
  if(activeType){
    const typeMap = {meeting:'work'};
    const btype = typeMap[b.type] || b.type;
    if(btype !== activeType) return false;
  }
  if(activePerson){
    if(b.who !== activePerson && b.who !== 'both') return false;
  }
  return true;
}
function whoLabel(w){return w==='both'?'Both':w==='sara'?'Sara':'Jaime';}
function whoClass(w){return w==='both'?'bw-both':'bw-'+w;}
function macroHtml(b){
  const ss=(activePerson===null||activePerson==='sara')&&b.sm&&(b.who==='sara'||b.who==='both');
  const sj=(activePerson===null||activePerson==='jaime')&&b.jm&&(b.who==='jaime'||b.who==='both');
  if(!ss&&!sj)return '';
  const chips=arr=>arr.map(c=>`<span class="mc">${c}</span>`).join('');
  if(ss&&sj)return`<div class="mwho">Sara</div><div class="macro-row">${chips(b.sm)}</div><div class="mwho" style="margin-top:3px">Jaime</div><div class="macro-row">${chips(b.jm)}</div>`;
  return`<div class="macro-row">${chips(ss?b.sm:b.jm)}</div>`;
}
function actLabel(type){
  const m={flight:'✈ Flight',work:'💼 Work',food:'🍽 Meal',social:'👥 Social',leisure:'🌿 Leisure',meeting:'📋 Meeting',workout:'💪 Workout',tourism:'🗺 Tourism'};
  return m[type]||type;
}
function actClass(type){
  const m={flight:'ch-flight',work:'ch-work',food:'ch-meal',social:'ch-social',leisure:'ch-free',meeting:'ch-work',workout:'ch-workout',tourism:'ch-tourism'};
  return m[type]||'ch-free';
}
function renderSection(days,id){
  const el=document.getElementById(id);let h='';
  days.forEach(d=>{
    const vis=d.blocks.filter(bVis);if(!vis.length)return;
    const bh=vis.map(b=>{
      const clickable = b.url ? `onclick="window.open('${b.url}','_blank')" class="block t-${b.type} who-${b.who} clickable"` : `class="block t-${b.type} who-${b.who}"`;
      return `<div ${clickable}>
      <span class="btime">${toAmPm(b.t)}</span>
      <div class="bbody">
        <div class="btitle">${b.title}${b.url?' 🔗':''}</div>
        ${b.sub?`<div class="bsub">${b.sub}</div>`:''}
        ${macroHtml(b)}
        ${b.note?`<div class="bnote">⚠ ${b.note}</div>`:''}
      </div>
      <span class="chip ${actClass(b.type)}" style="align-self:center;flex-shrink:0;margin-left:6px">${actLabel(b.type)}</span>
    </div>`;
    }).join('');
    const cid=`day-${d.date}`;
    const todayDate = new Date();
    const isToday = todayDate.getFullYear()===2026 && todayDate.getMonth()===4 && todayDate.getDate()===d.date;
    const isFiltering = activeType !== null || activePerson !== null;
    const expanded = isFiltering || isToday;
    h+=`<div class="day-card${expanded?'':' collapsed'}" id="${cid}">
      <div class="day-header" onclick="toggleDay('${cid}')">
        <span class="day-num">${d.date}</span>
        <div><div class="day-wd">${d.wd}</div><div class="day-mo">May 2026</div></div>
        <span class="chevron">▾</span>
      </div>
      <div class="blocks">${bh}</div>
      ${d.note?`<div class="day-note">⚠ ${d.note}</div>`:''}
    </div>`;
  });
  el.innerHTML=h||'<div class="empty">No blocks match the current filters.</div>';
}
function toggleDay(id){
  document.getElementById(id).classList.toggle('collapsed');
}
function render(){
  // keep filters stuck just below header
  const hdr = document.querySelector('.header');
  document.querySelector('.filters').style.top = hdr.offsetHeight + 'px';
  if(city==='miami') renderSection(MIAMI,'s-miami');
  if(city==='sf')    renderSection([...SF,...RET],'s-sf');
}
render();
